<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
       
        
        table {
            
        width: 500px;    
        border-collapse: collapse;
        border-radius: 10px;
        
        }

        tr.linha {
            background-color: gray;            
        } 

        td, th {
            border: 1px solid black;
            padding: 8px;            
        }
        
        td.dado {
            background-color: yellow;
        }
        td.verde {
            background-color: green;
        }
  
    </style>
    </head>
<body>
    <table >
        <tr class="linha"> 
            <th >Nome do Produto</th>
            <th>Categoria</th>
            <th>Preço (R$)</th>
            <th>Estoque</th>
        </tr>
            <tr >
                <td >Camiseta</td>
                <td class="verde">Vestuário</td>
                <td class="dado">49,90</td>
                <td class="verde">20</td>
            </tr>
                <tr>
                    <td>Notebook</td>
                    <td class="dado">Eletrônicos</td>
                    <td class="verde">3.500,00</td>
                    <td class="dado">5</td>
                </tr>
                    <tr>
                        <td>Café Gourmet</td>
                        <td class="verde">Alimentos</td>
                        <td class="dado">29,90</td>
                        <td class="verde">15</td>
                    </tr>            
    </table>
</body>
</html>
